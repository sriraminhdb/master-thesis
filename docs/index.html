<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Metrics Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: #1a1f35;
      --border: #2d3548;
      --text-primary: #e5e7eb;
      --text-secondary: #9ca3af;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
      --accent-purple: #8b5cf6;
      --glow-blue: rgba(59, 130, 246, 0.3);
      --glow-green: rgba(16, 185, 129, 0.3);
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    #root {
      min-height: 100vh;
    }
    
    .dashboard {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem;
      animation: fadeIn 0.6s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .header {
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
    }
    
    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    
    .header p {
      color: var(--text-secondary);
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border-color: var(--accent);
    }
    
    .stat-card:hover::before {
      opacity: 1;
    }
    
    .stat-card.blue { --accent: var(--accent-blue); }
    .stat-card.green { --accent: var(--accent-green); }
    .stat-card.yellow { --accent: var(--accent-yellow); }
    .stat-card.purple { --accent: var(--accent-purple); }
    
    .stat-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    
    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      line-height: 1.2;
      margin-bottom: 0.25rem;
    }
    
    .stat-unit {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 400;
    }
    
    .stat-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }
    
    .charts-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }
    
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      animation: slideIn 0.6s ease-out;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .chart-card h3 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
      font-weight: 600;
    }
    
    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    
    .device-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s;
    }
    
    .device-card:hover {
      border-color: var(--accent-blue);
      box-shadow: 0 10px 30px var(--glow-blue);
    }
    
    .device-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .device-name {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .device-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .badge-success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
    }
    
    .device-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    
    .device-stat {
      text-align: center;
    }
    
    .device-stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-blue);
    }
    
    .device-stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }
    
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 1rem;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: 8px;
      padding: 1rem;
      color: var(--accent-red);
      margin: 2rem 0;
    }
    
    .refresh-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 10px 30px var(--glow-blue);
      transition: all 0.3s;
      z-index: 1000;
    }
    
    .refresh-btn:hover {
      transform: scale(1.1) rotate(180deg);
      box-shadow: 0 15px 40px var(--glow-blue);
    }
    
    @media (max-width: 768px) {
      .dashboard {
        padding: 1rem;
      }
      
      .header h1 {
        font-size: 2rem;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .charts-section {
        grid-template-columns: 1fr;
      }
      
      .devices-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE = 'https://us-central1-thesisemulator.cloudfunctions.net/api/metrics';

    function Dashboard() {
      const [summary, setSummary] = useState(null);
      const [devices, setDevices] = useState([]);
      const [commands, setCommands] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      
      const pieChartRef = useRef(null);
      const pieChartInstance = useRef(null);
      
      // Use callback ref for line chart to ensure it's ready
      const [lineChartCanvas, setLineChartCanvas] = useState(null);
      const lineChartInstance = useRef(null);
      
      const lineChartCallbackRef = useCallback(node => {
        if (node !== null) {
          console.log('[Chart] Line chart canvas ref set');
          setLineChartCanvas(node);
        }
      }, []);

      const fetchData = async () => {
        setLoading(true);
        setError(null);
        
        try {
          // Fetch summary
          const summaryRes = await fetch(`${API_BASE}/summary`);
          const summaryData = await summaryRes.json();
          console.log('[API] Summary:', summaryData);
          setSummary(summaryData.data);

          // Fetch commands
          const commandsRes = await fetch(`${API_BASE}/commands`);
          const commandsData = await commandsRes.json();
          console.log('[API] Commands response:', commandsData);
          console.log('[API] Commands count:', commandsData.data?.length || 0);
          setCommands(commandsData.data || []);

          // Fetch device stats
          const deviceIds = ['light-1', 'washer-1', 'outlet-1', 'switch-1', 'energy-manager-1'];
          const devicePromises = deviceIds.map(id =>
            fetch(`${API_BASE}/device/${id}`).then(r => r.json())
          );
          const deviceResults = await Promise.all(devicePromises);
          const validDevices = deviceResults.map(r => r.data).filter(d => d && !d.noData);
          console.log('[API] Devices:', validDevices);
          setDevices(validDevices);

          setLoading(false);
        } catch (err) {
          console.error('[API] Error:', err);
          setError(err.message);
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 30000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (commands.length > 0 && lineChartCanvas) {
          console.log('[Chart] Creating line chart with', commands.length, 'commands');
          
          const ctx = lineChartCanvas.getContext('2d');
          
          if (lineChartInstance.current) {
            lineChartInstance.current.destroy();
          }

          const recentCommands = commands.slice(0, 20).reverse(); // Oldest to newest
          console.log('[Chart] Recent commands:', recentCommands.length);
          console.log('[Chart] Sample data:', recentCommands.slice(0, 3).map(c => c.responseTimeMs));
          
          try {
            lineChartInstance.current = new Chart(ctx, {
              type: 'line',
              data: {
                labels: recentCommands.map((_, i) => `#${i + 1}`),
                datasets: [{
                  label: 'Response Time (ms)',
                  data: recentCommands.map(cmd => cmd.responseTimeMs),
                  borderColor: '#3b82f6',
                  backgroundColor: 'rgba(59, 130, 246, 0.1)',
                  tension: 0.4,
                  fill: true,
                  pointRadius: 4,
                  pointHoverRadius: 6,
                  pointBackgroundColor: '#3b82f6',
                  pointBorderColor: '#ffffff',
                  pointBorderWidth: 2
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                  intersect: false,
                  mode: 'index'
                },
                plugins: {
                  legend: { 
                    display: true,
                    labels: { 
                      color: '#9ca3af',
                      font: { size: 12 }
                    }
                  },
                  tooltip: {
                    backgroundColor: '#1a1f35',
                    borderColor: '#3b82f6',
                    borderWidth: 2,
                    titleColor: '#e5e7eb',
                    bodyColor: '#e5e7eb',
                    padding: 12,
                    displayColors: true
                  }
                },
                scales: {
                  y: {
                    beginAtZero: true,
                    grid: { 
                      color: '#2d3548',
                      drawBorder: false
                    },
                    ticks: { 
                      color: '#9ca3af',
                      padding: 8
                    },
                    title: {
                      display: true,
                      text: 'Response Time (ms)',
                      color: '#9ca3af',
                      font: { size: 12 }
                    }
                  },
                  x: {
                    grid: { 
                      color: '#2d3548',
                      drawBorder: false
                    },
                    ticks: { 
                      color: '#9ca3af',
                      maxRotation: 0,
                      padding: 8
                    }
                  }
                }
              }
            });
            
            console.log('[Chart] Line chart created successfully');
          } catch (err) {
            console.error('[Chart] Error creating line chart:', err);
          }
        } else {
          console.log('[Chart] Cannot create line chart:', {
            commandsLength: commands.length,
            hasCanvas: !!lineChartCanvas
          });
        }
      }, [commands, lineChartCanvas]);

      useEffect(() => {
        // Wait a bit for DOM to be ready
        const timer = setTimeout(() => {
          if (devices.length > 0 && pieChartRef.current) {
            const ctx = pieChartRef.current.getContext('2d');
            
            if (pieChartInstance.current) {
              pieChartInstance.current.destroy();
            }

            const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444'];
            
            pieChartInstance.current = new Chart(ctx, {
              type: 'doughnut',
              data: {
                labels: devices.map(d => d.deviceId),
                datasets: [{
                  data: devices.map(d => d.totalCommands),
                  backgroundColor: COLORS,
                  borderWidth: 3,
                  borderColor: '#1a1f35',
                  hoverOffset: 10
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: {
                    display: true,
                    position: 'bottom',
                    labels: { 
                      color: '#e5e7eb', 
                      padding: 15,
                      font: { size: 12 }
                    }
                  },
                  tooltip: {
                    backgroundColor: '#1a1f35',
                    borderColor: '#2d3548',
                    borderWidth: 1,
                    titleColor: '#e5e7eb',
                    bodyColor: '#e5e7eb',
                    padding: 12,
                    callbacks: {
                      label: function(context) {
                        const label = context.label || '';
                        const value = context.parsed || 0;
                        const total = context.dataset.data.reduce((a, b) => a + b, 0);
                        const percentage = ((value / total) * 100).toFixed(1);
                        return `${label}: ${value} (${percentage}%)`;
                      }
                    }
                  }
                }
              }
            });
          }
        }, 100);
        
        return () => clearTimeout(timer);
      }, [devices]);

      if (loading) {
        return (
          <div className="loading">
            <div className="spinner"></div>
            <p style={{ color: 'var(--text-secondary)' }}>Loading metrics...</p>
          </div>
        );
      }

      if (error) {
        return (
          <div className="dashboard">
            <div className="error">
              <strong>Error loading data:</strong> {error}
            </div>
          </div>
        );
      }

      return (
        <div className="dashboard">
          <div className="header">
            <h1>Smart Home Metrics</h1>
            <p>Real-time performance monitoring • Last updated: {new Date().toLocaleTimeString()}</p>
          </div>

          {summary && (
            <div className="stats-grid">
              <div className="stat-card blue">
                <div className="stat-label">Total Commands</div>
                <div className="stat-value">{summary.totalCommands}</div>
                <div className="stat-subtitle">Executed successfully</div>
              </div>

              <div className="stat-card green">
                <div className="stat-label">Success Rate</div>
                <div className="stat-value">
                  {summary.successRate}
                  <span className="stat-unit">%</span>
                </div>
                <div className="stat-subtitle">{summary.successfulCommands} / {summary.totalCommands} succeeded</div>
              </div>

              <div className="stat-card yellow">
                <div className="stat-label">Avg Response Time</div>
                <div className="stat-value">
                  {summary.avgResponseTimeSec}
                  <span className="stat-unit">s</span>
                </div>
                <div className="stat-subtitle">{summary.avgResponseTimeMs}ms</div>
              </div>

              <div className="stat-card purple">
                <div className="stat-label">Active Devices</div>
                <div className="stat-value">{devices.length}</div>
                <div className="stat-subtitle">Monitoring {devices.length} devices</div>
              </div>
            </div>
          )}

          <div className="charts-section">
            <div className="chart-card">
              <h3>Response Time Trend (Last 20 Commands)</h3>
              <div style={{ 
                height: '320px', 
                width: '100%',
                position: 'relative', 
                padding: '10px',
                minHeight: '300px'
              }}>
                <canvas 
                  ref={lineChartCallbackRef} 
                  style={{ 
                    width: '100% !important',
                    height: '100% !important',
                    maxHeight: '300px'
                  }}
                ></canvas>
              </div>
            </div>

            <div className="chart-card">
              <h3>Commands by Device</h3>
              <div style={{ 
                height: '320px', 
                width: '100%',
                position: 'relative', 
                padding: '10px', 
                display: 'flex', 
                justifyContent: 'center', 
                alignItems: 'center' 
              }}>
                <canvas 
                  ref={pieChartRef} 
                  style={{ 
                    maxHeight: '280px', 
                    maxWidth: '280px' 
                  }}
                ></canvas>
              </div>
            </div>
          </div>

          <h2 style={{ fontSize: '1.5rem', marginBottom: '1.5rem', fontWeight: 600 }}>Device Performance</h2>
          <div className="devices-grid">
            {devices.map((device, i) => (
              <div key={i} className="device-card" style={{ animationDelay: `${i * 0.1}s` }}>
                <div className="device-header">
                  <div className="device-name">{device.deviceId}</div>
                  <div className="device-badge badge-success">
                    {device.successRate}% Success
                  </div>
                </div>
                <div className="device-stats">
                  <div className="device-stat">
                    <div className="device-stat-value">{device.totalCommands}</div>
                    <div className="device-stat-label">Commands</div>
                  </div>
                  <div className="device-stat">
                    <div className="device-stat-value">{device.avgResponseMs}</div>
                    <div className="device-stat-label">Avg (ms)</div>
                  </div>
                  <div className="device-stat">
                    <div className="device-stat-value">{device.minResponseMs}</div>
                    <div className="device-stat-label">Min (ms)</div>
                  </div>
                  <div className="device-stat">
                    <div className="device-stat-value">{device.maxResponseMs}</div>
                    <div className="device-stat-label">Max (ms)</div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <button className="refresh-btn" onClick={fetchData} title="Refresh data">
            ↻
          </button>
        </div>
      );
    }

    ReactDOM.render(<Dashboard />, document.getElementById('root'));
  </script>
</body>
</html>
